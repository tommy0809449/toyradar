<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>登入完成｜ToyRadar</title>
<style>
  :root {
    --bg: #0f1115;
    --bg-card: #171a21;
    --text: #e8e9ec;
    --text-dim: #9aa0aa;
    --accent: #5b8cff;
    --border: #262a33;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box {
    max-width: 440px;
    text-align: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
  }
  .box .icon { font-size: 2.2rem; margin-bottom: 16px; }
  .box h1 { font-size: 1.3rem; margin-bottom: 14px; }
  .box p { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 24px; }
  .box a {
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 8px;
    transition: border-color 0.3s ease;
  }
  .box a:hover { border-color: var(--accent); }
</style>
</head>
<body>

<div class="box">
  <div class="icon">✅</div>
  <h1>身分驗證完成</h1>
  <p>你的 Discord 帳號已經確認。到 ToyRadar 的 Discord 群組輸入 <code>!subscribe</code>，機器人會私訊給你專屬的訂閱付款連結，完成付款後自動加入身分組。<br><br>金流審核完成前，連結會先顯示「審核中」，通過後就能直接付款。</p>
  <a href="/toyradar/">回到首頁</a>
</div>

</body>
</html>
